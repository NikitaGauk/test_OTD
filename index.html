<!DOCTYPE html>
<html>
<head>
    <title>Тестирование знаний</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Шапка */
        .header {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { font-size: 1em; opacity: 0.9; }
        
        /* Контейнер для теста на весь экран */
        .test-container {
            height: calc(100vh - 80px);
            width: 100%;
            padding: 10px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: white;
        }
        
        /* КНОПКА-ПОДСКАЗКА ВНИЗУ (только если нет параметров) */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            padding: 12px 20px;
            border-radius: 50px;
            text-align: center;
            font-size: 0.95em;
            color: #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.3s;
            z-index: 1000;
        }
        
        .hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .test-container { height: calc(100vh - 70px); }
            .hint { font-size: 0.85em; padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Система тестирования</h1>
        <p>Отдел эксплуатационно-технической документации</p>
    </div>
    
    <div class="test-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwRFEfaLgj0j0PYnTfk55GKCxSDbSc0x_cqP1ADhtTz3NOD_Mup44QfU3qnZjnCQN8x/exec" 
            title="Тестирование"
            loading="lazy">
        </iframe>
    </div>
    
    <!-- Подсказка, которая исчезнет после ввода ФИО -->
    <div class="hint" id="hint">
        👆 Введите ФИО и выберите категорию выше
    </div>

    <script>
        // Проверяем, есть ли уже параметры в URL (значит тест начат)
        if (window.location.search.includes('fio=') && window.location.search.includes('cat=')) {
            document.getElementById('hint').classList.add('hidden');
        }

        // Следим за изменением URL в iframe
        const iframe = document.getElementById('testFrame');
        if (iframe) {
            setInterval(() => {
                if (iframe.src.includes('?fio=')) {
                    document.getElementById('hint').classList.add('hidden');
                }
            }, 1000);
        }
    </script>
</body>
</html>
