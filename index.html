<!DOCTYPE html>
<html>
<head>
    <title>Тестирование знаний</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { font-size: 1em; opacity: 0.9; }
        
        .test-container {
            height: calc(100vh - 80px);
            width: 100%;
            padding: 10px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Система тестирования</h1>
        <p>Отдел эксплуатационно-технической документации</p>
    </div>
    
    <div class="test-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbye_2lQVGo4nK92xAY2tUb3Axtf18-V9LaHY-EQCw8HeY-VXNWCS8nrEGLliA4uVbyl/exec" 
            title="Тестирование"
            loading="lazy">
        </iframe>
    </div>
</body>
</html>
