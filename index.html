<!DOCTYPE html>
<html>
<head>
    <title>Тестирование знаний</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .info-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
                
        .info-card ul {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .info-card li {
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #555;
            border-left: 3px solid #667eea;
            transition: transform 0.2s;
        }
        
        .info-card li:hover {
            transform: translateX(5px);
            background: #f0f2f5;
        }
        
        .info-card li:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .iframe-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s;
        }
        
        .iframe-container:hover {
            transform: translateY(-5px);
        }
        
        iframe {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }
        
        .stats-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 1em; }
            iframe { height: 600px; }
            .info-card ul {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            iframe { height: 550px; }
            .container { padding: 0 10px; }
            .info-card { padding: 15px; }
        }
        
        /* Анимация загрузки */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Система тестирования</h1>
        <p>Отдел эксплуатационно-технической документации</p>
        <div class="stats-badge">
        </div>
    </div>
    
    <div class="container">
        <div class="info-card">
            <ul>
                <li>Введите свои ФИО</li>
                <li>Выберите категорию тестирования</li>
                <li>Ответьте на все вопросы правильно</li>
                <li>Результаты передаются руководителю отдела</li>
            </ul>
        </div>
        
        <div class="iframe-container">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzEjIQ-ciC8qxCd0Du9KQGx6LHHE3z48EHJm4YqJF42kdWf7OTGWPk2y0dDj1EGL-w0/exec" 
                title="Тестирование"
                loading="lazy"
                allow="microphone; camera">
            </iframe>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <script>
        // Скрываем загрузку после загрузки iframe
        document.querySelector('iframe').addEventListener('load', function() {
            document.getElementById('loading').style.display = 'none';
        });
        
        // Обработка ошибок iframe
        document.querySelector('iframe').addEventListener('error', function() {
            alert('Ошибка загрузки тестирования. Пожалуйста, обновите страницу или попробуйте позже.');
        });
    </script>
</body>
</html>
