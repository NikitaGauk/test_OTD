<!DOCTYPE html>
<html>
<head>
    <title>Тестирование знаний</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Шапка */
        .header {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { font-size: 1em; opacity: 0.9; }
        
        /* Контейнер для теста на весь экран */
        .test-container {
            height: calc(100vh - 80px);
            width: 100%;
            padding: 10px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: white;
        }
        
        /* Маленькая подсказка сверху (будет скрыта после начала теста) */
        .top-hint {
            background: rgba(255,215,0,0.9);
            color: #333;
            padding: 8px 15px;
            text-align: center;
            font-size: 0.9em;
            font-weight: 500;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            transition: opacity 0.3s;
        }
        
        .top-hint.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Маленькая подсказка сверху (будет скрыта) -->
    <div class="top-hint" id="topHint">
        👆 Для начала теста: введите ФИО и выберите категорию
    </div>
    
    <div class="header">
        <h1>📋 Система тестирования</h1>
        <p>Отдел эксплуатационно-технической документации</p>
    </div>
    
    <div class="test-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwRFEfaLgj0j0PYnTfk55GKCxSDbSc0x_cqP1ADhtTz3NOD_Mup44QfU3qnZjnCQN8x/exec" 
            title="Тестирование"
            loading="lazy"
            id="testFrame">
        </iframe>
    </div>

    <script>
        // Функция для скрытия подсказки
        function hideHint() {
            const hint = document.getElementById('topHint');
            if (hint) {
                hint.classList.add('hidden');
                console.log('Подсказка скрыта'); // для отладки
            }
        }

        // 1. Проверяем URL родительской страницы
        if (window.location.search.includes('fio=') || window.location.search.includes('cat=')) {
            hideHint();
        }

        // 2. Проверяем URL внутри iframe каждую секунду
        const iframe = document.getElementById('testFrame');
        let checkCount = 0;
        
        const interval = setInterval(() => {
            try {
                // Проверяем, изменился ли URL в iframe
                if (iframe.src.includes('?fio=')) {
                    hideHint();
                    clearInterval(interval); // останавливаем проверку
                }
                
                // Останавливаем проверку после 30 секунд (чтобы не грузить)
                checkCount++;
                if (checkCount > 30) {
                    clearInterval(interval);
                }
            } catch (e) {
                // Если не можем прочитать URL (безопасность браузера)
                console.log('Не могу прочитать iframe');
            }
        }, 1000);

        // 3. Слушаем сообщения от iframe (самый надёжный способ)
        window.addEventListener('message', function(event) {
            // Проверяем, что сообщение от нашего скрипта
            if (event.data && event.data.type === 'TEST_STARTED') {
                hideHint();
            }
        });

        // 4. Отправляем сообщение в iframe, чтобы он тоже мог нам ответить
        setTimeout(() => {
            iframe.contentWindow.postMessage({ type: 'CHECK_STATUS' }, '*');
        }, 2000);
    </script>
</body>
</html>
